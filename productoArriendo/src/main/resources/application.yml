server:
  port: ${PORT:8084}

spring:
  application:
    name: productoArriendo
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/db_tiendamusical
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver


  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history_productoArriendo
    baseline-version: "0"

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: laClaveDeLaTiendaDeMusicaEstanLargaLoSuficiente

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8791/eureka/}
  instance:
    prefer-ip-address: true