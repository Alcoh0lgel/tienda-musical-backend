server:
  port: 8086

spring:
  application:
    name: arriendo
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/db_tiendamusical
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyaway_schema_history_arriendo
    baseline-version: "0"

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: laClaveDeLaTiendaDeMusicaEstanLargaLoSuficiente

cliente-service:
  url: http://localhost:8082/api/clientes

productoArriendo-service:
  url: http://localhost:8084/api/productoArriendo
