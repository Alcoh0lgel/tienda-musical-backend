server:
  port: ${PORT:8082}

spring:
  application:
    name: cliente
  profiles:
    active: dev


  datasource:
    url: jdbc:mysql://localhost:3306/db_tiendamusical
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_cliente
    baseline-version: "0"

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: laClaveDeLaTiendaDeMusicaEstanLargaLoSuficiente

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8791/eureka/}
  instance:
    prefer-ip-address: true
