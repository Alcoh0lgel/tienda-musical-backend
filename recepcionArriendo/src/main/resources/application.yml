server:
  port: 8090

spring:
  application:
    name: recepcionArriendo
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/db_tiendamusical
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver


  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyaway_schema_history_recepcionArriendo
    baseline-version: "0"

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: laClaveDeLaTiendaDeMusicaEstanLargaLoSuficiente


arriendo-service:
  url: http://localhost:8086/api/arriendos
